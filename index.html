<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>EduPlanFin-AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>EduPlanFin-AI</h1>

    <!-- Dados -->
    <input type="text" id="escola" placeholder="Nome da escola">
    <input type="text" id="professor" placeholder="Nome do professor">
    <input type="text" id="disciplina" placeholder="Disciplina">
    <input type="date" id="data">

    <input type="text" id="tema" placeholder="Tema da aula">
    <input type="text" id="serie" placeholder="Série">
    <input type="text" id="tempo" placeholder="Tempo disponível">

    <button onclick="gerarPlano()">Gerar Plano</button>
    <button onclick="baixarPlano()">Baixar PDF</button>
    <button onclick="limparCampos()">Limpar</button>

    <div id="resultado"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
